<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Lucro Real - Motoristas e Entregadores</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <meta name="theme-color" content="#121214">
</head>
<body class="bg-[#121214] text-gray-100 font-sans min-h-screen flex flex-col items-center p-4">

    <!-- Container Principal do App -->
    <div class="w-full max-w-md bg-[#1a1a1e] border border-gray-800 rounded-2xl p-5 shadow-2xl">
        
        <h1 class="text-xs font-bold tracking-widest text-gray-400 uppercase mb-4 text-center">Seu Veículo de Trabalho</h1>

        <!-- Seleção de Veículos com Ícones Corrigidos -->
        <div class="grid grid-cols-3 gap-3 mb-6">
            <button type="button" onclick="configurarTela('moto')" id="btnMoto" class="btn-veiculo flex flex-col items-center justify-center p-3 rounded-xl border border-gray-700 bg-amber-500 text-black font-semibold transition-all">
                <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 16l-1-3h16l-1 3M6 16a2 2 0 100 4 2 2 0 000-4zm12 0a2 2 0 100 4 2 2 0 000-4zM6.5 13L9 6h6l2.5 7"/></svg>
                <span class="text-xs">Moto</span>
            </button>
            <button type="button" onclick="configurarTela('carro')" id="btnCarro" class="btn-veiculo flex flex-col items-center justify-center p-3 rounded-xl border border-gray-700 bg-[#26262b] text-gray-300 font-semibold transition-all">
                <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 17a2 2 0 11-4 0 2 2 0 014 0zM19 17a2 2 0 11-4 0 2 2 0 014 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M13 16V6a1 1 0 00-1-1H4a1 1 0 00-1 1v10h1m10 0h1m-1 0H4m14 0h3v-3.5a1 1 0 00-.3-.7l-2-2a1 1 0 00-.7-.3H17v6.5z"/></svg>
                <span class="text-xs">Carro</span>
            </button>
            <button type="button" onclick="configurarTela('eletrico')" id="btnEletrico" class="btn-veiculo flex flex-col items-center justify-center p-3 rounded-xl border border-gray-700 bg-[#26262b] text-gray-300 font-semibold transition-all">
                <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                <span class="text-xs">Elétrico</span>
            </button>
        </div>

        <!-- Formulário de Cálculo -->
        <form id="calcForm" class="space-y-4">
            
            <!-- KM Rodados -->
            <div>
                <label class="block text-xs font-semibold text-amber-500 uppercase tracking-wider mb-1">⚠️ KM Rodados no Dia</label>
                <input type="number" step="any" id="kmRodados" placeholder="Ex: 180" required class="w-full bg-[#121214] border border-gray-700 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-amber-500">
            </div>

            <!-- Faturamento Bruto -->
            <div>
                <label class="block text-xs font-semibold text-amber-500 uppercase tracking-wider mb-1">💰 Faturamento Bruto do Dia (R$)</label>
                <input type="number" step="any" id="faturamento" placeholder="Ex: 220" required class="w-full bg-[#121214] border border-gray-700 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-amber-500">
            </div>

            <!-- Consumo Médio e Preço (Perfeitamente Alinhados) -->
            <div class="grid grid-cols-2 gap-4 items-end">
                <div class="flex flex-col justify-end h-full">
                    <label id="labelConsumo" class="block text-xs font-semibold text-amber-500 uppercase tracking-wider mb-1 min-h-[32px] flex items-end">Consumo Médio (KM/L)</label>
                    <input type="number" step="any" id="consumo" placeholder="Ex: 35" required class="w-full bg-[#121214] border border-gray-700 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-amber-500">
                </div>
                <div class="flex flex-col justify-end h-full">
                    <label id="labelPreco" class="block text-xs font-semibold text-amber-500 uppercase tracking-wider mb-1 min-h-[32px] flex items-end">Preço do Litro do Combustível (R$)</label>
                    <input type="number" step="any" id="precoCombustivel" placeholder="Ex: 5.89" required class="w-full bg-[#121214] border border-gray-700 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-amber-500">
                </div>
            </div>

            <!-- Meta de Ganho por KM -->
            <div>
                <label class="block text-xs font-semibold text-amber-500 uppercase tracking-wider mb-1">🎯 Sua Meta de Ganho por KM (R$)</label>
                <input type="number" step="any" id="metaGanho" value="1.95" required class="w-full bg-[#121214] border border-gray-700 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-amber-500">
            </div>

            <!-- Abrir o Capô (Custos Ocultos) -->
            <details class="bg-[#121214] border border-gray-800 rounded-xl p-3 text-sm">
                <summary class="cursor-pointer font-semibold text-amber-500 flex items-center justify-between">
                    <span>🛢️ Abrir o Capô: Ajustar Custos Ocultos</span>
                </summary>
                <div class="mt-3 space-y-3 pt-2 border-t border-gray-800">
                    <div>
                        <label class="block text-[11px] text-gray-400">Óleo / Lubrificação por KM (R$)</label>
                        <input type="number" step="any" id="cfgOleo" class="w-full bg-[#1a1a1e] border border-gray-700 rounded-lg p-2 text-white text-xs">
                    </div>
                    <div>
                        <label class="block text-[11px] text-gray-400">Pneus por KM (R$)</label>
                        <input type="number" step="any" id="cfgPneus" class="w-full bg-[#1a1a1e] border border-gray-700 rounded-lg p-2 text-white text-xs">
                    </div>
                    <div>
                        <label class="block text-[11px] text-gray-400">Manutenção / Mecânica por KM (R$)</label>
                        <input type="number" step="any" id="cfgMecanica" class="w-full bg-[#1a1a1e] border border-gray-700 rounded-lg p-2 text-white text-xs">
                    </div>
                    <div>
                        <label class="block text-[11px] text-gray-400">Taxas e Depreciação por KM (R$)</label>
                        <input type="number" step="any" id="cfgTaxas" class="w-full bg-[#1a1a1e] border border-gray-700 rounded-lg p-2 text-white text-xs">
                    </div>
                </div>
            </details>

            <!-- Botão de Calcular -->
            <button type="submit" class="w-full bg-amber-500 hover:bg-amber-600 text-black font-bold py-3.5 rounded-xl transition-all shadow-lg uppercase tracking-wider text-sm">
                Calcular Lucro Real
            </button>
        </form>

        <!-- Seção de Resultados -->
        <div id="secaoResultado" class="hidden mt-6 pt-5 border-t border-gray-800 space-y-3">
            <div class="bg-[#121214] p-4 rounded-xl border border-gray-800 flex justify-between items-center">
                <span class="text-xs text-gray-400">Custo Total por KM:</span>
                <span id="resultadoCustoKm" class="text-lg font-bold text-white">R$ 0,00</span>
            </div>
            <div class="bg-[#121214] p-4 rounded-xl border border-gray-800 flex justify-between items-center">
                <span class="text-xs text-gray-400">Lucro Líquido Real:</span>
                <span id="resultadoLucroReal" class="text-xl font-extrabold text-amber-500">R$ 0,00</span>
            </div>
            
            <!-- Painel de Metas -->
            <div id="painelMeta" class="p-4 rounded-xl text-xs"></div>
        </div>

        <!-- Rodapé -->
        <div class="mt-8 pt-4 border-t border-gray-800 text-center">
            <a id="linkAfiliado" href="https://s.shopee.com.br/40epImbWXq" target="_blank" class="text-[11px] text-gray-500 hover:text-amber-500 transition-colors underline block">
                🛒 Equipamentos e Acessórios Recomendados para Pista
            </a>
            <p class="text-[10px] text-gray-600 mt-1">Calculadora de Lucro Real - Projeto Acadêmico</p>
        </div>

    </div>

    <!-- Script Completo e Funcional -->
    <script>
        const defaults = {
            moto: { consumo: 35, oleo: 0.02, pneus: 0.01, mecanica: 0.03, taxas: 0.01, link: "https://s.shopee.com.br/40epImbWXq" },
            carro: { consumo: 10, oleo: 0.01, pneus: 0.02, mecanica: 0.05, taxas: 0.03, link: "https://s.shopee.com.br/AAFSeDbohx" },
            eletrico: { consumo: 6, oleo: 0.00, pneus: 0.03, mecanica: 0.02, taxas: 0.03, link: "https://s.shopee.com.br/AAFSeDbohx" }
        };

        let veiculoAtual = 'moto';

        // Carrega valores salvos ao abrir o app
        window.addEventListener('DOMContentLoaded', () => {
            carregarDadosVeiculo(veiculoAtual);
        });

        function configurarTela(chave) {
            veiculoAtual = chave;

            // Altera o estilo visual dos botões de veículos
            document.querySelectorAll('.btn-veiculo').forEach(btn => {
                btn.classList.remove('bg-amber-500', 'text-black');
                btn.classList.add('bg-[#26262b]', 'text-gray-300');
            });
            
            const btnAtivo = document.getElementById(chave === 'moto' ? 'btnMoto' : chave === 'carro' ? 'btnCarro' : 'btnEletrico');
            btnAtivo.classList.remove('bg-[#26262b]', 'text-gray-300');
            btnAtivo.classList.add('bg-amber-500', 'text-black');

            // Ajusta textos de consumo/preço
            const labelConsumo = document.getElementById('labelConsumo');
            const labelPreco = document.getElementById('labelPreco');

            if (chave === 'eletrico') {
                labelConsumo.innerHTML = 'Consumo Médio (KM/KWH)';
                labelPreco.innerHTML = 'Preço do KWH da Energia (R$)';
            } else {
                labelConsumo.innerHTML = 'Consumo Médio (KM/L)';
                labelPreco.innerHTML = 'Preço do Litro do Combustível (R$)';
            }

            // Atualiza link de afiliado correspondente
            document.getElementById('linkAfiliado').href = defaults[chave].link;

            carregarDadosVeiculo(chave);
        }

        function carregarDadosVeiculo(chave) {
            const consumoSalvo = localStorage.getItem('consumo_' + chave);
            const precoSalvo = localStorage.getItem('preco_' + chave);

            document.getElementById('consumo').value = consumoSalvo ? consumoSalvo : defaults[chave].consumo;
            document.getElementById('precoCombustivel').value = precoSalvo ? precoSalvo : (chave === 'eletrico' ? '0.95' : '5.89');

            document.getElementById('cfgOleo').value = defaults[chave].oleo;
            document.getElementById('cfgPneus').value = defaults[chave].pneus;
            document.getElementById('cfgMecanica').value = defaults[chave].mecanica;
            document.getElementById('cfgTaxas').value = defaults[chave].taxas;
        }

        // Ação do Cálculo
        document.getElementById('calcForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const km = parseFloat(document.getElementById('kmRodados').value) || 0;
            const faturamento = parseFloat(document.getElementById('faturamento').value) || 0;
            const consumo = parseFloat(document.getElementById('consumo').value) || 0;
            const precoCombustivel = parseFloat(document.getElementById('precoCombustivel').value) || 0;
            const meta = parseFloat(document.getElementById('metaGanho').value) || 0;

            const cOleo = parseFloat(document.getElementById('cfgOleo').value) || 0;
            const cPneus = parseFloat(document.getElementById('cfgPneus').value) || 0;
            const cMecanica = parseFloat(document.getElementById('cfgMecanica').value) || 0;
            const cTaxas = parseFloat(document.getElementById('cfgTaxas').value) || 0;

            // Salva na memória do celular do usuário
            localStorage.setItem('consumo_' + veiculoAtual, consumo);
            localStorage.setItem('preco_' + veiculoAtual, precoCombustivel);

            if (km === 0 || consumo === 0) {
                alert("Por favor, preencha os campos corretamente.");
                return;
            }

            const custoCombustivelPorKm = precoCombustivel / consumo;
            const custoOcultoPorKm = cOleo + cPneus + cMecanica + cTaxas;
            const custoTotalPorKm = custoCombustivelPorKm + custoOcultoPorKm;
            const custoTotalDia = custoTotalPorKm * km;
            
            const lucroLiquido = faturamento - custoTotalDia;
            const ganhoLiquidoPorKm = lucroLiquido / km;

            // Exibe resultados
            document.getElementById('resultadoCustoKm').innerText = `R$ ${custoTotalPorKm.toFixed(2)}`;
            document.getElementById('resultadoLucroReal').innerText = `R$ ${lucroLiquido.toFixed(2)}`;

            const painelMeta = document.getElementById('painelMeta');
            if (ganhoLiquidoPorKm >= meta) {
                painelMeta.className = "p-4 rounded-xl bg-green-950/50 border border-green-600 text-green-300 text-xs";
                painelMeta.innerHTML = `<strong>Meta Atingida! 🎉</strong> Ganho líquido de <strong>R$ ${ganhoLiquidoPorKm.toFixed(2)} por KM</strong>. Parabéns!`;
            } else {
                painelMeta.className = "p-4 rounded-xl bg-red-950/50 border border-red-600 text-red-300 text-xs";
                painelMeta.innerHTML = `<strong>Abaixo da Meta! ⚠️</strong> Ganho líquido de <strong>R$ ${ganhoLiquidoPorKm.toFixed(2)} por KM</strong>. Cuidado com as corridas baratas!`;
            }

            document.getElementById('secaoResultado').classList.remove('hidden');
        });
    </script>
</body>
</html>
